<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(220)">
      <stop offset="0" stop-color="#00E8FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00E8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#63F5FF"/>
      <stop offset="0.5" stop-color="#00E8FF"/>
      <stop offset="1" stop-color="#00A9C7"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="166" y1="166" x2="346" y2="346" gradientUnits="userSpaceOnUse">
      <stop stop-color="#03141B"/>
      <stop offset="1" stop-color="#07222D"/>
    </linearGradient>
    <filter id="softGlow" x="58" y="58" width="396" height="396" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="220" fill="url(#bgGlow)"/>

  <g filter="url(#softGlow)">
    <!-- Main O ring -->
    <circle cx="256" cy="256" r="146" stroke="url(#ringGrad)" stroke-width="42" stroke-linecap="round"/>
    <!-- Orbit cut to give a dynamic tech look -->
    <path d="M366 154C386 171 402 194 412 220" stroke="#0B3847" stroke-width="30" stroke-linecap="round"/>
    <!-- Orbit accent -->
    <path d="M116 292C104 229 123 165 167 121C230 58 326 57 390 118" stroke="#8DF8FF" stroke-opacity="0.75" stroke-width="10" stroke-linecap="round"/>
    <!-- Inner core -->
    <circle cx="256" cy="256" r="80" fill="url(#innerGrad)" stroke="#41EEFF" stroke-opacity="0.5" stroke-width="4"/>
    <!-- Small node -->
    <circle cx="389" cy="119" r="10" fill="#B6FCFF"/>
  </g>
</svg>
