<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="920" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9FF8FF"/>
      <stop offset="0.45" stop-color="#00E8FF"/>
      <stop offset="1" stop-color="#00B8D1"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="920" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="920" height="220" fill="transparent"/>

  <g filter="url(#glow)">
    <image href="LOGO%201.png" x="6" y="20" width="180" height="180" preserveAspectRatio="xMidYMid meet"/>
    <text x="200" y="142" fill="url(#wordGrad)" font-size="96" letter-spacing="4" font-family="Orbitron, Exo 2, Arial, sans-serif" font-weight="700">
      RBITALDATA
    </text>
  </g>
</svg>
